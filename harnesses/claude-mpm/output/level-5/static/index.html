<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Board</title>
    <script src="https://unpkg.com/htmx.org@2.0.0/dist/htmx.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f2f5; color: #333; }

        /* Navigation */
        nav { background: #1e293b; color: white; padding: 1rem 2rem; display: flex; align-items: center; gap: 1rem; }
        nav h1 { font-size: 1.25rem; font-weight: 700; }
        nav .spacer { flex: 1; }
        nav button { background: #3b82f6; color: white; border: none; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        nav button:hover { background: #2563eb; }
        #user-info { font-size: 0.875rem; opacity: 0.8; }

        /* Auth screens */
        .auth-container { max-width: 400px; margin: 4rem auto; padding: 2rem; background: white; border-radius: 12px; box-shadow: 0 4px 16px rgba(0,0,0,0.1); }
        .auth-container h2 { margin-bottom: 1.5rem; font-size: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; margin-bottom: 0.25rem; font-weight: 500; font-size: 0.875rem; }
        .form-group input { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
        .form-group input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59,130,246,0.2); }
        .btn-primary { width: 100%; background: #3b82f6; color: white; border: none; padding: 0.75rem; border-radius: 6px; font-size: 1rem; cursor: pointer; }
        .btn-primary:hover { background: #2563eb; }
        .auth-switch { text-align: center; margin-top: 1rem; font-size: 0.875rem; }
        .auth-switch a { color: #3b82f6; cursor: pointer; text-decoration: none; }
        .error-msg { color: #ef4444; font-size: 0.875rem; margin-top: 0.5rem; min-height: 1.25rem; }

        /* Board list */
        .page { padding: 2rem; }
        .page-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 2rem; }
        .page-header h2 { font-size: 1.5rem; font-weight: 700; }
        .boards-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
        .board-card { background: white; border-radius: 10px; padding: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,0.08); cursor: pointer; border: 2px solid transparent; transition: border-color 0.2s; }
        .board-card:hover { border-color: #3b82f6; }
        .board-card h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 0.5rem; }
        .board-card p { color: #6b7280; font-size: 0.875rem; }
        .new-board-card { border: 2px dashed #d1d5db; background: transparent; display: flex; align-items: center; justify-content: center; min-height: 120px; color: #6b7280; font-size: 0.9rem; }
        .new-board-card:hover { border-color: #3b82f6; color: #3b82f6; background: #eff6ff; }

        /* Kanban board */
        .board-view { padding: 1.5rem; overflow-x: auto; }
        .board-view-header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem; }
        .board-view-header h2 { font-size: 1.25rem; font-weight: 700; }
        .back-btn { background: none; border: 1px solid #d1d5db; padding: 0.375rem 0.75rem; border-radius: 6px; cursor: pointer; font-size: 0.875rem; }
        .kanban { display: flex; gap: 1rem; min-height: calc(100vh - 160px); align-items: flex-start; }
        .column { background: #f1f5f9; border-radius: 10px; width: 300px; flex-shrink: 0; padding: 1rem; }
        .column-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .column-header h3 { font-size: 0.9rem; font-weight: 600; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; }
        .column-count { background: #cbd5e1; color: #475569; border-radius: 12px; padding: 0 8px; font-size: 0.75rem; font-weight: 600; }
        .task-list { display: flex; flex-direction: column; gap: 0.75rem; min-height: 60px; }
        .task-card { background: white; border-radius: 8px; padding: 1rem; box-shadow: 0 1px 4px rgba(0,0,0,0.08); cursor: pointer; border-left: 3px solid transparent; }
        .task-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.12); }
        .task-card.priority-high { border-left-color: #ef4444; }
        .task-card.priority-medium { border-left-color: #f59e0b; }
        .task-card.priority-low { border-left-color: #10b981; }
        .task-title { font-size: 0.9rem; font-weight: 500; margin-bottom: 0.375rem; }
        .task-desc { font-size: 0.8rem; color: #6b7280; margin-bottom: 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .task-meta { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; }
        .priority-badge { padding: 1px 8px; border-radius: 10px; font-weight: 500; }
        .priority-high { background: #fee2e2; color: #ef4444; }
        .priority-medium { background: #fef3c7; color: #d97706; }
        .priority-low { background: #d1fae5; color: #10b981; }
        .add-task-btn { width: 100%; background: none; border: 1px dashed #cbd5e1; padding: 0.5rem; border-radius: 6px; cursor: pointer; color: #64748b; font-size: 0.8rem; margin-top: 0.5rem; }
        .add-task-btn:hover { background: #e2e8f0; }

        /* Modal */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: white; border-radius: 12px; padding: 1.5rem; width: 100%; max-width: 480px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
        .modal h3 { font-size: 1.1rem; font-weight: 600; margin-bottom: 1.25rem; }
        .modal-footer { display: flex; gap: 0.75rem; justify-content: flex-end; margin-top: 1.5rem; }
        .btn-secondary { background: white; border: 1px solid #d1d5db; padding: 0.5rem 1rem; border-radius: 6px; cursor: pointer; }
        .btn-secondary:hover { background: #f9fafb; }
        select { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; }
        textarea { width: 100%; padding: 0.625rem 0.75rem; border: 1px solid #d1d5db; border-radius: 6px; font-size: 0.9rem; resize: vertical; min-height: 80px; }

        /* WS status */
        .ws-status { font-size: 0.75rem; padding: 3px 10px; border-radius: 12px; }
        .ws-connected { background: #d1fae5; color: #10b981; }
        .ws-disconnected { background: #fee2e2; color: #ef4444; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <nav>
        <h1>Task Board</h1>
        <div class="spacer"></div>
        <span id="user-info" class="hidden"></span>
        <span id="ws-status" class="ws-status ws-disconnected hidden">Offline</span>
        <button id="logout-btn" class="hidden" onclick="logout()">Logout</button>
    </nav>

    <!-- Auth Section -->
    <div id="auth-section">
        <div id="login-form" class="auth-container">
            <h2>Sign In</h2>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="login-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="login-password" placeholder="••••••••">
            </div>
            <div class="error-msg" id="login-error"></div>
            <button class="btn-primary" onclick="login()">Sign In</button>
            <div class="auth-switch">
                No account? <a onclick="showRegister()">Create one</a>
            </div>
        </div>

        <div id="register-form" class="auth-container hidden">
            <h2>Create Account</h2>
            <div class="form-group">
                <label>Display Name</label>
                <input type="text" id="reg-name" placeholder="Your Name">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="reg-email" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="reg-password" placeholder="••••••••">
            </div>
            <div class="error-msg" id="register-error"></div>
            <button class="btn-primary" onclick="register()">Create Account</button>
            <div class="auth-switch">
                Have an account? <a onclick="showLogin()">Sign in</a>
            </div>
        </div>
    </div>

    <!-- App Section -->
    <div id="app-section" class="hidden">
        <!-- Board List -->
        <div id="boards-page" class="page">
            <div class="page-header">
                <h2>My Boards</h2>
            </div>
            <div id="boards-grid" class="boards-grid">
                <div class="board-card new-board-card" onclick="showCreateBoard()">+ New Board</div>
            </div>
        </div>

        <!-- Board View -->
        <div id="board-page" class="board-view hidden">
            <div class="board-view-header">
                <button class="back-btn" onclick="showBoards()">← Back</button>
                <h2 id="board-title"></h2>
                <span id="ws-indicator" class="ws-status ws-disconnected">Offline</span>
            </div>
            <div id="kanban" class="kanban"></div>
        </div>
    </div>

    <!-- Create Board Modal -->
    <div id="create-board-modal" class="modal-overlay">
        <div class="modal">
            <h3>Create New Board</h3>
            <div class="form-group">
                <label>Board Name</label>
                <input type="text" id="new-board-name" placeholder="e.g. Sprint 1">
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <textarea id="new-board-desc" placeholder="What is this board for?"></textarea>
            </div>
            <div class="error-msg" id="board-error"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('create-board-modal')">Cancel</button>
                <button class="btn-primary" style="width:auto;padding:0.5rem 1.25rem" onclick="createBoard()">Create</button>
            </div>
        </div>
    </div>

    <!-- Create Task Modal -->
    <div id="create-task-modal" class="modal-overlay">
        <div class="modal">
            <h3>Add Task</h3>
            <input type="hidden" id="task-column-id">
            <div class="form-group">
                <label>Title</label>
                <input type="text" id="new-task-title" placeholder="Task title">
            </div>
            <div class="form-group">
                <label>Description (optional)</label>
                <textarea id="new-task-desc" placeholder="Task details..."></textarea>
            </div>
            <div class="form-group">
                <label>Priority</label>
                <select id="new-task-priority">
                    <option value="low">Low</option>
                    <option value="medium" selected>Medium</option>
                    <option value="high">High</option>
                </select>
            </div>
            <div class="error-msg" id="task-error"></div>
            <div class="modal-footer">
                <button class="btn-secondary" onclick="closeModal('create-task-modal')">Cancel</button>
                <button class="btn-primary" style="width:auto;padding:0.5rem 1.25rem" onclick="createTask()">Add Task</button>
            </div>
        </div>
    </div>

    <script>
        const API = '';
        let token = localStorage.getItem('token') || '';
        let currentBoardId = null;
        let ws = null;

        function authHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };
        }

        async function api(method, path, body) {
            const res = await fetch(API + path, {
                method,
                headers: authHeaders(),
                body: body ? JSON.stringify(body) : undefined,
            });
            if (res.status === 401) { logout(); return null; }
            return res;
        }

        // Auth
        async function login() {
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;
            document.getElementById('login-error').textContent = '';
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password }),
            });
            if (!res.ok) {
                document.getElementById('login-error').textContent = 'Invalid email or password';
                return;
            }
            const data = await res.json();
            token = data.access_token;
            localStorage.setItem('token', token);
            await initApp();
        }

        async function register() {
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            const display_name = document.getElementById('reg-name').value;
            document.getElementById('register-error').textContent = '';
            const res = await fetch('/api/auth/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password, display_name }),
            });
            if (!res.ok) {
                const err = await res.json();
                document.getElementById('register-error').textContent = err.detail || 'Registration failed';
                return;
            }
            // Auto-login
            document.getElementById('reg-email').value = email;
            document.getElementById('login-email').value = email;
            document.getElementById('login-password').value = password;
            await login();
        }

        function logout() {
            token = '';
            localStorage.removeItem('token');
            if (ws) { ws.close(); ws = null; }
            document.getElementById('auth-section').classList.remove('hidden');
            document.getElementById('app-section').classList.add('hidden');
            document.getElementById('logout-btn').classList.add('hidden');
            document.getElementById('user-info').classList.add('hidden');
        }

        function showLogin() {
            document.getElementById('login-form').classList.remove('hidden');
            document.getElementById('register-form').classList.add('hidden');
        }

        function showRegister() {
            document.getElementById('register-form').classList.remove('hidden');
            document.getElementById('login-form').classList.add('hidden');
        }

        async function initApp() {
            if (!token) return;
            const meRes = await api('GET', '/api/users/me');
            if (!meRes || !meRes.ok) { logout(); return; }
            const me = await meRes.json();
            document.getElementById('auth-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('logout-btn').classList.remove('hidden');
            document.getElementById('user-info').classList.remove('hidden');
            document.getElementById('user-info').textContent = me.display_name || me.email;
            await loadBoards();
        }

        // Boards
        async function loadBoards() {
            showBoards();
            const res = await api('GET', '/api/boards');
            if (!res || !res.ok) return;
            const boards = await res.json();
            const grid = document.getElementById('boards-grid');
            grid.innerHTML = '<div class="board-card new-board-card" onclick="showCreateBoard()">+ New Board</div>';
            boards.forEach(b => {
                const card = document.createElement('div');
                card.className = 'board-card';
                card.innerHTML = `<h3>${escHtml(b.name)}</h3><p>${escHtml(b.description || 'No description')}</p>`;
                card.onclick = () => openBoard(b.id, b.name);
                grid.insertBefore(card, grid.firstChild);
            });
        }

        function showBoards() {
            document.getElementById('boards-page').classList.remove('hidden');
            document.getElementById('board-page').classList.add('hidden');
            if (ws) { ws.close(); ws = null; }
            currentBoardId = null;
        }

        function showCreateBoard() {
            document.getElementById('new-board-name').value = '';
            document.getElementById('new-board-desc').value = '';
            document.getElementById('board-error').textContent = '';
            document.getElementById('create-board-modal').classList.add('active');
        }

        async function createBoard() {
            const name = document.getElementById('new-board-name').value.trim();
            if (!name) { document.getElementById('board-error').textContent = 'Name is required'; return; }
            const res = await api('POST', '/api/boards', {
                name,
                description: document.getElementById('new-board-desc').value,
            });
            if (!res || !res.ok) { document.getElementById('board-error').textContent = 'Failed to create board'; return; }
            closeModal('create-board-modal');
            await loadBoards();
        }

        // Board view
        async function openBoard(boardId, boardName) {
            currentBoardId = boardId;
            document.getElementById('board-title').textContent = boardName;
            document.getElementById('boards-page').classList.add('hidden');
            document.getElementById('board-page').classList.remove('hidden');
            await renderBoard(boardId);
            connectWebSocket(boardId);
        }

        async function renderBoard(boardId) {
            const res = await api('GET', `/api/boards/${boardId}`);
            if (!res || !res.ok) return;
            const board = await res.json();
            const kanban = document.getElementById('kanban');
            kanban.innerHTML = '';
            const cols = board.columns.slice().sort((a, b) => a.position - b.position);
            cols.forEach(col => {
                const colEl = document.createElement('div');
                colEl.className = 'column';
                colEl.innerHTML = `
                    <div class="column-header">
                        <h3>${escHtml(col.name)}</h3>
                        <span class="column-count">${col.tasks.length}</span>
                    </div>
                    <div class="task-list" id="col-${col.id}">
                        ${col.tasks.map(t => taskCardHtml(t)).join('')}
                    </div>
                    <button class="add-task-btn" onclick="showAddTask(${col.id})">+ Add task</button>
                `;
                kanban.appendChild(colEl);
            });
        }

        function taskCardHtml(t) {
            return `<div class="task-card priority-${t.priority}" title="${escHtml(t.description || '')}">
                <div class="task-title">${escHtml(t.title)}</div>
                ${t.description ? `<div class="task-desc">${escHtml(t.description)}</div>` : ''}
                <div class="task-meta">
                    <span class="priority-badge priority-${t.priority}">${t.priority}</span>
                </div>
            </div>`;
        }

        // Tasks
        function showAddTask(columnId) {
            document.getElementById('task-column-id').value = columnId;
            document.getElementById('new-task-title').value = '';
            document.getElementById('new-task-desc').value = '';
            document.getElementById('new-task-priority').value = 'medium';
            document.getElementById('task-error').textContent = '';
            document.getElementById('create-task-modal').classList.add('active');
        }

        async function createTask() {
            const title = document.getElementById('new-task-title').value.trim();
            const column_id = parseInt(document.getElementById('task-column-id').value);
            if (!title) { document.getElementById('task-error').textContent = 'Title is required'; return; }
            const res = await api('POST', '/api/tasks', {
                title,
                description: document.getElementById('new-task-desc').value,
                column_id,
                priority: document.getElementById('new-task-priority').value,
            });
            if (!res || !res.ok) {
                const err = await res.json().catch(() => ({}));
                document.getElementById('task-error').textContent = err.detail || 'Failed to create task';
                return;
            }
            closeModal('create-task-modal');
            // Board will refresh via WS or manually
            if (!ws || ws.readyState !== WebSocket.OPEN) {
                await renderBoard(currentBoardId);
            }
        }

        // WebSocket
        function connectWebSocket(boardId) {
            const wsUrl = `${location.protocol === 'https:' ? 'wss' : 'ws'}://${location.host}/ws/${boardId}?token=${token}`;
            ws = new WebSocket(wsUrl);
            const indicator = document.getElementById('ws-indicator');
            ws.onopen = () => {
                indicator.textContent = 'Live';
                indicator.className = 'ws-status ws-connected';
            };
            ws.onmessage = async (e) => {
                const msg = JSON.parse(e.data);
                if (['task_created', 'task_updated', 'task_moved', 'task_deleted'].includes(msg.event)) {
                    await renderBoard(boardId);
                }
            };
            ws.onclose = () => {
                indicator.textContent = 'Offline';
                indicator.className = 'ws-status ws-disconnected';
            };
        }

        // Utilities
        function closeModal(id) {
            document.getElementById(id).classList.remove('active');
        }

        function escHtml(str) {
            const d = document.createElement('div');
            d.textContent = str;
            return d.innerHTML;
        }

        // Handle enter key in modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                document.querySelectorAll('.modal-overlay.active').forEach(m => m.classList.remove('active'));
            }
        });

        // Initialize on load
        if (token) { initApp(); }
    </script>
</body>
</html>
