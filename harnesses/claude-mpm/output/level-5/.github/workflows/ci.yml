name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run linting
        run: |
          black --check .
          isort --check-only .
          flake8 task_board/ --max-line-length=100

      - name: Run tests with coverage
        run: |
          pytest tests/ -v --cov=task_board --cov-report=xml --cov-report=term-missing
        env:
          DATABASE_URL: sqlite:///:memory:
          SECRET_KEY: test-secret-key-for-ci

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.12'
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t task-board:latest .

      - name: Test Docker image
        run: |
          docker run -d --name task-board-test \
            -e SECRET_KEY=test-key \
            -p 8000:8000 \
            task-board:latest
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          docker stop task-board-test
          docker rm task-board-test
